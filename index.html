<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│v1.0.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --bg-color: #0f1115;
  --card-bg: rgba(30, 33, 40, 0.7);
  --text-main: #f3f4f6;
  --text-sub: #9ca3af;
  --accent: #6366f1;
  --agree-color: #ef4444;
  --disagree-color: #3b82f6;
  --absent-color: #374151;
  --radius: 20px;
}

body {
  margin: 0;
  background: var(--bg-color);
  background-image: radial-gradient(circle at 50% 0%, #1f2233 0%, #0f1115 80%);
  color: var(--text-main);
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.card {
  flex: 1;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 40px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* 投票画面 - Chromebook向け画面一杯レイアウト */
#voteArea {
  padding: 20px;
  justify-content: space-between;
}

#progress {
  font-size: 24px;
  font-weight: 600;
  color: var(--text-sub);
  letter-spacing: 0.2em;
}

#studentId {
  font-size: 80px;
  font-weight: 800;
  margin: 10px 0;
  letter-spacing: 0.1em;
}

.vote-main {
  display: flex;
  width: 100%;
  flex: 1; /* 画面中央を占有 */
  gap: 20px;
  margin: 20px 0;
}

.vote-half {
  flex: 1;
  font-size: 80px; /* 特大サイズ */
  font-weight: 800;
  border: none;
  border-radius: 30px;
  color: white;
  cursor: pointer;
  transition: transform 0.1s, filter 0.1s;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  font-family: inherit;
}

.agree { background: linear-gradient(145deg, #ff6b6b, var(--agree-color)); }
.disagree { background: linear-gradient(145deg, #60a5fa, var(--disagree-color)); }

.vote-half:active { transform: scale(0.95); filter: brightness(0.8); }

.absent {
  width: 100%;
  height: 120px;
  font-size: 32px;
  font-weight: 700;
  background: var(--absent-color);
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* 役割選択画面のスキャナー非表示用 */
#reader {
  width: 350px;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px auto;
  border: 2px solid rgba(255,255,255,0.1);
}

/* 結果画面のカメラエリア */
#centerArea {
  width: 100%;
  max-width: 400px;
  margin: 20px auto;
}

#reader2 {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 20px;
  overflow: hidden;
  border: 3px solid var(--accent);
  background: #000;
}

/* 共通ボタン */
.qr-btn {
  font-size: 20px;
  font-weight: 700;
  padding: 20px 40px;
  margin: 10px;
  border: none;
  border-radius: 15px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: all 0.2s;
}
.qr-btn:hover { transform: translateY(-2px); }

/* ヘッダー・戻る */
#userBar {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(255,255,255,0.1);
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 1000;
  font-weight: 600;
  display: none;
}
#backBtn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

/* 結果表示 */
.result-flex {
  display: flex;
  width: 100%;
  justify-content: space-around;
  align-items: center;
  flex-wrap: wrap;
}
.result-left {
  font-size: 32px;
  line-height: 1.8;
  text-align: left;
}
.result-left span { font-weight: 800; font-size: 48px; margin-left: 20px; }

#qrBox { background: white; padding: 15px; border-radius: 15px; }

input#voteCode {
  font-size: 40px;
  width: 300px;
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--accent);
  color: white;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<div id="userBar" onclick="toggleMenu()">
  <span id="userLabel"></span>
  <div id="dropdown" style="display:none; position:absolute; background:#222; width:100%; left:0; top:100%; border-radius:10px; margin-top:5px;">
    <div onclick="logout()" style="padding:15px; color:#ff4d4d; border-radius:10px;">ログアウト</div>
  </div>
</div>

<div id="setup" class="card">
<h2 id="setupTitle">QRコードを読み取ってください</h2>
<div id="reader"></div>
<button id="qrBtn" class="qr-btn" onclick="startQR()">スキャン開始</button>

<div id="afterScan" style="display:none;">
<button class="qr-btn" onclick="selectRole('child1')">評議委員 A</button>
<button class="qr-btn" onclick="selectRole('child2')">評議委員 B</button>
</div>
</div>

<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" type="text" placeholder="0000">
<br>
<button class="qr-btn" onclick="startVoting()">投票開始</button>
</div>

<div id="voteArea" class="card" style="display:none;">
<button id="backBtn" onclick="goBack()">← 戻る</button>

<div>
  <div id="progress"></div>
  <div id="studentId"></div>
</div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>
</div>

<div id="resultArea" class="card" style="display:none;">
<h1 id="resultTitle">集計結果</h1>

<div class="result-flex">
  <div class="result-left">
    賛成：<span id="agreeNum" style="color:var(--agree-color)">0</span><br>
    反対：<span id="disagreeNum" style="color:var(--disagree-color)">0</span><br>
    欠席：<span id="absentNum">0</span>
  </div>

  <div id="centerArea"></div>

  <div class="result-right">
    <button id="mergeBtn" class="qr-btn">① データ受信（スキャン）</button>
    <button id="sendBtn" class="qr-btn" onclick="submitData()" disabled style="background:#444;">② 生徒会に送信</button>
    <button id="homeBtn" class="qr-btn" onclick="goHome()" style="background:#444;">③ 終了して戻る</button>
  </div>
</div>
</div>

</div>

<script>
// ロジックは維持
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;
let mergeQr;
let isMerged=false;

window.onload=()=>{
 let saved=localStorage.getItem("classData");
 if(saved){
  let d=JSON.parse(saved);
  cls=d.cls;start=d.start;end=d.end;role=d.role;
  document.getElementById("setup").style.display="none";
document.getElementById("codeInput").style.display="block";
  updateUserBar();
 }
};

function startQR(){
 document.getElementById("qrBtn").style.display="none";
 html5QrCode=new Html5Qrcode("reader");
 html5QrCode.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   let data=JSON.parse(text);
   cls=data.class;
   ranges=data.ranges;
   html5QrCode.stop().then(() => {
     // 修正：スキャンが終わったらリーダー自体を非表示にする
     document.getElementById("reader").style.display="none";
     document.getElementById("setupTitle").innerText="役割を選択してください";
     afterScan.style.display="block";
   });
  }
 ).catch(()=>alert("カメラ起動失敗"));
}

function selectRole(r){
 let t=ranges.find(x=>x.role===r);
 start=t.start; end=t.end; role=r;
 localStorage.setItem("classData",JSON.stringify({cls,start,end,role}));
 setup.style.display="none";
 codeInput.style.display="block";
 updateUserBar();
}

function updateUserBar(){
 let base=cls.replace("-","");
 userLabel.innerText= role==="child1" ? `評議委員A: ${base}${start}~${end}` : `評議委員B: ${base}${start}~${end}`;
 userBar.style.display="block";
}

function toggleMenu(){
 let dp = document.getElementById("dropdown");
 dp.style.display= dp.style.display==="block"?"none":"block";
}

function logout(){
 if(!confirm("ログアウトしますか？"))return;
 localStorage.clear();
 location.reload();
}

function startVoting(){
 let code=voteCode.value;
 if(!code)return alert("投票コードを入力してください");
 voteCodeGlobal=code;
 if(!confirm(`${start}番から${end}番まで投票を開始しますか？`))return;
 current=start;
 codeInput.style.display="none";
 voteArea.style.display="block";
 userBar.style.display="none";
 update();
}

function update(){
 progress.innerText=`PROGRESS: ${current} / ${end}`;
 let num=cls.replace("-","");
 studentId.innerText= `${num}${String(current).padStart(2,"0")}`;
}

function vote(type){
 votes.push(type);
 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;
 current++;
 current>end?showResult():update();
}

function goBack(){
 if(current===start)return;
 if(!confirm("１つ前の投票に戻りますか？"))return;
 current--;
 let last=votes.pop();
 if(last==="賛成")agree--;
 if(last==="反対")disagree--;
 if(last==="欠席")absent--;
 update();
}

function showResult(){
 voteArea.style.display="none";
 resultArea.style.display="block";
 userBar.style.display="block";
 resultTitle.innerText=`${cls} (${start}~${end}) 集計結果`;
 agreeNum.innerText=agree;
 disagreeNum.innerText=disagree;
 absentNum.innerText=absent;

 let center=document.getElementById("centerArea");
 center.innerHTML="";

 if(role==="child1"){
  // A側の修正：カメラエリアを明示的に作成
  let reader=document.createElement("div");
  reader.id="reader2";
  center.appendChild(reader);
  mergeBtn.onclick=startMergeQR;
 }

 if(role==="child2"){
  let box=document.createElement("div");
  box.id="qrBox";
  center.appendChild(box);
  new QRCode(box,{
   text:`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`,
   width:240,height:240
  });
  mergeBtn.style.display="none";
  sendBtn.style.display="none";
  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";
 }
}

function startMergeQR(){
 if(isMerged)return;
 mergeQr=new Html5Qrcode("reader2");
 mergeQr.start({facingMode:"environment"},{fps:10,qrbox:200},
 text=>{
  let [c,code,a,d,ab]=text.split("|");
  if(c!==cls||code!==voteCodeGlobal){
   alert("読み取ったデータのクラスまたは投票コードが一致しません。");
   return;
  }
  mergeQr.stop().then(() => {
    document.getElementById("reader2").style.display="none";
    agree+=+a; disagree+=+d; absent+=+ab;
    agreeNum.innerText=agree; disagreeNum.innerText=disagree; absentNum.innerText=absent;
    isMerged=true;
    sendBtn.disabled=false;
    sendBtn.style.background="var(--accent)";
    mergeBtn.style.display="none";
    alert("データの同期が完了しました。");
  });
 });
}

function submitData(){
 const btn = document.getElementById("sendBtn");
 if(role !== "child1") return;
 if(!isMerged){ alert("先に委員Bのデータをスキャンしてください"); return; }

 btn.disabled = true;
 btn.innerText = "送信中...";

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({ class:cls, code:voteCodeGlobal, agree, disagree, absent })
 })
 .then(()=>{
  btn.innerText = "送信完了";
  btn.style.background = "#222";
  document.getElementById("homeBtn").style.background = "#fff";
  document.getElementById("homeBtn").style.color = "#000";
  alert("生徒会サーバーへデータを送信しました。");
 })
 .catch(()=>{
  btn.innerText = "送信失敗 (再試行)";
  btn.disabled = false;
  alert("送信に失敗しました。ネット接続を確認してください。");
 });
}

function goHome(){
 if(!confirm("ホームに戻ると現在の集計データは消去されます。よろしいですか？")) return;
 location.reload();
}

window.addEventListener("beforeunload", function (e) {
 if(document.getElementById("voteArea").style.display === "block"){
  e.preventDefault(); e.returnValue = "";
 }
});
</script>

</body>
</html>
