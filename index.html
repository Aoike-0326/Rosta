<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│v1.0.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* CSSを全面的にモダンなスタイルへ書き換え */
:root {
  --bg-color: #0f1115;
  --card-bg: rgba(30, 33, 40, 0.7);
  --text-main: #f3f4f6;
  --text-sub: #9ca3af;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --agree-color: #ef4444;
  --disagree-color: #3b82f6;
  --absent-color: #4b5563;
  --radius: 24px;
}

body {
  margin: 0;
  background: var(--bg-color);
  background-image: radial-gradient(circle at 50% 0%, #1f2233 0%, #0f1115 80%);
  color: var(--text-main);
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  width: 100%;
  max-width: 600px; /* スマホ・タブレット向けに最適化 */
  height: 95%;
  padding: 15px;
  box-sizing: border-box;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius);
  width: 100%;
  height: 100%;
  padding: 30px 20px;
  box-sizing: border-box;
  text-align: center;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h1, h2 {
  margin-top: 0;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.qr-btn {
  font-size: 16px;
  font-weight: 600;
  padding: 16px 32px;
  margin: 10px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
  font-family: inherit;
  letter-spacing: 0.05em;
}

.qr-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
}

.qr-btn:active {
  transform: translateY(1px);
  box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
}

.qr-btn:disabled {
  background: #374151 !important;
  color: #9ca3af !important;
  box-shadow: none !important;
  cursor: not-allowed;
  transform: none;
}

input#voteCode {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  outline: none;
  transition: all 0.3s ease;
  width: 80%;
  max-width: 300px;
  font-family: inherit;
  font-weight: 600;
  letter-spacing: 2px;
}

input#voteCode:focus {
  border-color: var(--accent);
  box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
}

/* 投票画面に特化したレイアウト調整 */
#voteArea {
  justify-content: flex-start;
  padding-top: 70px;
}

#progress {
  font-size: 18px;
  color: var(--text-sub);
  margin-bottom: 5px;
  font-weight: 600;
  letter-spacing: 2px;
}

#studentId {
  font-size: 64px;
  font-weight: 800;
  margin-bottom: 30px;
  text-shadow: 0 4px 20px rgba(255,255,255,0.1);
  letter-spacing: 2px;
}

.vote-main {
  display: flex;
  width: 100%;
  gap: 15px;
  height: 45vh;
  margin-bottom: 15px;
}

.vote-half {
  flex: 1;
  font-size: 40px;
  font-weight: 700;
  border: none;
  border-radius: 20px;
  color: white;
  cursor: pointer;
  transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}

.agree {
  background: linear-gradient(145deg, #ff6b6b, var(--agree-color));
}
.disagree {
  background: linear-gradient(145deg, #60a5fa, var(--disagree-color));
}

.vote-half:active {
  transform: scale(0.94);
  filter: brightness(0.9);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.absent {
  width: 100%;
  height: 10vh;
  min-height: 80px;
  font-size: 24px;
  font-weight: 600;
  background: var(--absent-color);
  color: white;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}
.absent:active {
  transform: scale(0.96);
  background: #374151;
}

/* ヘッダー・ドロップダウンメニュー */
#userBar {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 18px;
  border-radius: 12px;
  cursor: pointer;
  z-index: 1000;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.2s;
  display: none; /* JS制御用 */
}
#userBar:hover {
  background: rgba(255, 255, 255, 0.15);
}

#dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  margin-top: 8px;
  background: rgba(20, 20, 25, 0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#dropdown div {
  padding: 15px;
  color: #ff6b6b;
  text-align: center;
  font-weight: bold;
  transition: background 0.2s;
}
#dropdown div:hover {
  background: rgba(255,255,255,0.05);
}

/* 戻るボタン */
#backBtn {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 18px;
  border-radius: 12px;
  cursor: pointer;
  z-index: 100;
  transition: all 0.2s ease;
  font-family: inherit;
}
#backBtn:hover {
  background: rgba(255,255,255,0.2);
}

/* 結果画面のレイアウト */
.result-flex {
  display: flex;
  flex-direction: column;
  width: 100%;
  align-items: center;
  gap: 25px;
  margin-top: 10px;
}

.result-left {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  background: rgba(0,0,0,0.3);
  padding: 20px 40px;
  border-radius: 20px;
  width: 80%;
  line-height: 2;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
}
.result-left span {
  font-weight: 800;
  font-size: 28px;
  margin-left: 10px;
}
#agreeNum { color: #ff8787; }
#disagreeNum { color: #74c0fc; }
#absentNum { color: #ced4da; }

.result-right {
  display: flex;
  flex-direction: column;
  width: 100%;
  gap: 12px;
}
.result-right .qr-btn {
  margin: 0;
  width: 100%;
}

/* カメラ・QRコード表示エリア */
#reader, #reader2 {
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
#qrBox {
  background: white;
  padding: 15px;
  border-radius: 16px;
  display: inline-block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

@media (min-width: 768px) {
  .result-flex {
    flex-direction: row;
    justify-content: space-around;
    align-items: stretch;
  }
  .result-left {
    text-align: left;
    width: auto;
  }
  .result-right {
    width: auto;
    min-width: 220px;
  }
}
</style>
</head>

<body>
<div class="container">

<div id="userBar" onclick="toggleMenu()">
  <span id="userLabel"></span>
  <div id="dropdown">
    <div onclick="logout()" style="padding:10px;">ログアウト</div>
  </div>
</div>

<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button id="qrBtn" class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
<h2>役割選択</h2>
<button class="qr-btn" onclick="selectRole('child1')">評議委員A</button>
<button class="qr-btn" onclick="selectRole('child2')">評議委員B</button>
</div>
</div>

<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode">
<br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<div id="voteArea" class="card" style="display:none;">
<button id="backBtn" onclick="goBack()">戻る</button>

<div id="progress"></div>
<div id="studentId"></div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>
</div>

<div id="resultArea" class="card" style="display:none;">

<h1 id="resultTitle"></h1>

<div class="result-flex">

<div class="result-left">
  賛成：<span id="agreeNum"></span><br>
  反対：<span id="disagreeNum"></span><br>
  欠席：<span id="absentNum"></span>
</div>

<div id="centerArea"></div>

<div class="result-right">
<button id="mergeBtn" class="qr-btn">① データ受信</button>

<button id="sendBtn" class="qr-btn" onclick="submitData()" disabled style="background:#555;">
② 生徒会に送信
</button>

<button id="homeBtn" class="qr-btn" onclick="goHome()" style="background:#555;">
③ ホームに戻る
</button>

<div id="loading" style="display:none;">送信中...</div>
</div>

</div>
</div>

</div>

<script>
// ---------- ここから下のJavaScriptは一切変更していません ----------
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;
let mergeQr;
let isMerged=false;

window.onload=()=>{
 let saved=localStorage.getItem("classData");
 if(saved){
  let d=JSON.parse(saved);
  cls=d.cls;start=d.start;end=d.end;role=d.role;

  document.getElementById("setup").style.display="none";
document.getElementById("codeInput").style.display="block";
  updateUserBar();
 }
};

function startQR(){
 document.getElementById("qrBtn").style.display="none";

 html5QrCode=new Html5Qrcode("reader");

 html5QrCode.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   let data=JSON.parse(text);
   cls=data.class;
   ranges=data.ranges;
   html5QrCode.stop();
   afterScan.style.display="block";
  }
 ).catch(()=>alert("カメラ起動失敗"));
}

function selectRole(r){
 let t=ranges.find(x=>x.role===r);
 start=t.start; end=t.end; role=r;

 localStorage.setItem("classData",JSON.stringify({cls,start,end,role}));

 setup.style.display="none";
 codeInput.style.display="block";
 updateUserBar();
}

function updateUserBar(){
 let base=cls.replace("-","");
 userLabel.innerText=
 role==="child1"
 ? `評議委員A ${base}${start}~${base}${end}`
 : `評議委員B ${base}${start}~${base}${end}`;

 userBar.style.display="block";
}

function toggleMenu(){
 dropdown.style.display=
 dropdown.style.display==="block"?"none":"block";
}

function logout(){
 if(!confirm("ログアウトしますか？ログアウトすると今までのデータがリセットされます。"))return;
 localStorage.clear();
 location.reload();
}

function startVoting(){
 let code=voteCode.value;
 if(!code)return alert("投票コードが記入されていません。");

 voteCodeGlobal=code;

 if(!confirm(`${start}〜${end}で開始する？`))return;

 current=start;
 codeInput.style.display="none";
 voteArea.style.display="block";
 userBar.style.display="none";

 update();
}

function update(){
 progress.innerText=`${current}/${end}`;
 let num=cls.replace("-","");
 studentId.innerText=
 `${num}${String(current).padStart(2,"0")}`;
}

function vote(type){
 votes.push(type);
 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;

 current++;
 current>end?showResult():update();
}

function goBack(){
 if(current===start)return;
 if(!confirm("前の投票に戻りますか？"))return;

 current--;
 let last=votes.pop();
 if(last==="賛成")agree--;
 if(last==="反対")disagree--;
 if(last==="欠席")absent--;

 update();
}

function showResult(){
 voteArea.style.display="none";
 resultArea.style.display="block";
 userBar.style.display="block";

 resultTitle.innerText=`${start}~${end}集計結果`;
 agreeNum.innerText=agree;
 disagreeNum.innerText=disagree;
 absentNum.innerText=absent;

 let center=document.getElementById("centerArea");
 center.innerHTML="";

 if(role==="child1"){
  let reader=document.createElement("div");
  reader.id="reader2";
  center.appendChild(reader);

  mergeBtn.onclick=startMergeQR;
 }

 if(role==="child2"){
  let box=document.createElement("div");
  box.id="qrBox";
  center.appendChild(box);

  new QRCode(box,{
   text:`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`,
   width:240,height:240
  });

  mergeBtn.style.display="none";
  sendBtn.style.display="none";

  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";
 }
}

function startMergeQR(){
 if(isMerged)return;

 mergeQr=new Html5Qrcode("reader2");

 mergeQr.start({facingMode:"environment"},{fps:10,qrbox:250},
 text=>{
  let [c,code,a,d,ab]=text.split("|");

  if(c!==cls||code!==voteCodeGlobal){
   alert("コードエラー");
   return;
  }

  mergeQr.stop();

  agree+=+a;
  disagree+=+d;
  absent+=+ab;

  agreeNum.innerText=agree;
  disagreeNum.innerText=disagree;
  absentNum.innerText=absent;

  isMerged=true;

  sendBtn.disabled=false;
  sendBtn.style.background="#fff";
  sendBtn.style.color="#000";

  mergeBtn.style.background="#555";

  alert("受信完了");
 });
}

function submitData(){

 const btn = document.getElementById("sendBtn");

 if(role !== "child1"){
  alert("この端末では送信できません");
  return;
 }

 if(!isMerged){
  alert("先にデータ受信してください");
  return;
 }

 // 🔄 送信中UI
 btn.disabled = true;
 btn.innerText = "送信中...";

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({
   class:cls,
   code:voteCodeGlobal,
   agree,
   disagree,
   absent
  })
 })
 .then(()=>{
  // ✅ 成功
  btn.innerText = "送信済み！";
  btn.style.background = "#555";

  const homeBtn = document.getElementById("homeBtn");
  homeBtn.style.background = "#fff";
  homeBtn.style.color = "#000";

  alert("送信成功");
 })
 .catch(()=>{
  // ❌ 失敗
  btn.innerText = "② 生徒会に送信";
  btn.disabled = false;
  alert("送信失敗");
 });
}
function goHome(){
 if(!confirm("ホームに戻ると現在のデータは消えます。本当に戻りますか？")) return;
 location.reload();
}

 window.addEventListener("beforeunload", function (e) {

 // 投票中だけ発動させる
 if(document.getElementById("voteArea").style.display === "block"){

  e.preventDefault();
  e.returnValue = "";
 }

});
</script>

</body>
</html>
