<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│ルスタ20</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body { height:100%; margin:0; }
body {
 font-family:sans-serif;
 background:#111;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
}
.container { width:100%; max-width:1200px; height:95%; }
.card { width:100%; height:100%; text-align:center; position:relative; }

.qr-btn { font-size:28px; padding:15px 30px; margin:15px; }

.vote-main { flex:1; display:flex; }
.vote-half {
 flex:1; font-size:70px; border:none;
}
.agree { background:#ff3b3b; }
.disagree { background:#2f6bff; }

.absent {
 width:100%; height:120px; font-size:40px;
 background:#444; color:white; border:none;
}

#roleBox {
 position:absolute;
 top:10px;
 left:10px;
 background:#222;
 padding:10px 15px;
 border-radius:8px;
 cursor:pointer;
}
#menu {
 display:none;
 margin-top:10px;
 background:#333;
 padding:10px;
 border-radius:6px;
}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button class="qr-btn" onclick="startQR()">QR開始</button>
</div>

<!-- コード入力 -->
<div id="codeInput" class="card" style="display:none;">

<div id="roleBox" onclick="toggleMenu()">
 <span id="roleText"></span>
 <div id="menu">
  <div onclick="logout()">ログアウト</div>
 </div>
</div>

<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:32px;">
<br><br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">
<div id="progress"></div>
<div id="studentId" style="font-size:60px;"></div>

<div id="child2Area" style="display:none;">
<div id="child2QR"></div>
<button class="qr-btn" onclick="generateChild2QR()">QR再表示</button>
<button class="qr-btn" onclick="startVoteAfterQR()">投票開始</button>
</div>

<div class="vote-main" id="voteButtons" style="display:none;">
<button class="vote-half agree" onclick="vote('賛成')">賛成</button>
<button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" id="absentBtn" style="display:none;" onclick="vote('欠席')">欠席</button>
</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">
<div id="resultText"></div>
<button class="qr-btn" onclick="submitData()">送信</button>
<div id="qrArea"></div>
</div>

</div>

<script>
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;
let isSending=false;

// 起動時復元
window.onload=function(){
 let saved=localStorage.getItem("classData");
 if(!saved) return;

 let data=JSON.parse(saved);
 cls=data.cls;
 ranges=data.ranges;
 role=data.role;

 if(role==="child1"){
  start=ranges[0].start;
  end=ranges[0].end;
 }else{
  start=ranges[1].start;
  end=ranges[1].end;
 }

 document.getElementById("setup").style.display="none";
 document.getElementById("codeInput").style.display="block";

 setRoleDisplay();
};

// QR開始
function startQR(){
 html5QrCode=new Html5Qrcode("reader");
 html5QrCode.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   onScanSuccess(text);
   html5QrCode.stop().catch(()=>{});
  }
 );
}

// QR読み取り
function onScanSuccess(text){
 try{
  let data=JSON.parse(text);
  cls=data.class;
  ranges=data.ranges;
  role=ranges[0].role;

  start=ranges[0].start;
  end=ranges[0].end;

 }catch{
  let p=text.split("|");
  if(p.length!==4){ alert("QRエラー"); return; }

  cls=p[0];
  start=+p[1];
  end=+p[2];
  role=p[3];
 }

 localStorage.setItem("classData",JSON.stringify({cls,ranges,role}));

 document.getElementById("setup").style.display="none";
 document.getElementById("codeInput").style.display="block";

 setRoleDisplay();
}

// 表示
function setRoleDisplay(){
 let label = (role==="child1")
  ? `評議員A ${start}〜${end}`
  : `評議員B ${start}〜${end}`;

 document.getElementById("roleText").innerText=label;
}

// メニュー
function toggleMenu(){
 let m=document.getElementById("menu");
 m.style.display=(m.style.display==="block")?"none":"block";
}

// 外クリック閉じ
document.addEventListener("click",e=>{
 let box=document.getElementById("roleBox");
 if(!box.contains(e.target)){
  document.getElementById("menu").style.display="none";
 }
});

// ログアウト
function logout(){
 if(!confirm("リセットする？")) return;
 localStorage.removeItem("classData");
 location.reload();
}

// 投票開始
function startVoting(){
 let code=document.getElementById("voteCode").value.trim();
 if(!code){ alert("コード入力"); return; }

 voteCodeGlobal=code;

 current=start;

 document.getElementById("roleBox").style.display="none";
 document.getElementById("codeInput").style.display="none";
 document.getElementById("voteArea").style.display="block";

 if(role==="child1"){
  generateChild2QR();
 }else{
  showVotingUI();
 }
}

// 子機2QR
function generateChild2QR(){
 let data=`${cls}|${ranges[1].start}|${ranges[1].end}|child2`;

 let box=document.getElementById("child2QR");
 box.innerHTML="";
 box.style.background="white";

 new QRCode(box,{text:data,width:250,height:250});

 document.getElementById("child2Area").style.display="block";
}

// QR後開始
function startVoteAfterQR(){
 document.getElementById("child2Area").style.display="none";
 showVotingUI();
}

// UI
function showVotingUI(){
 document.getElementById("voteButtons").style.display="flex";
 document.getElementById("absentBtn").style.display="block";
 update();
}

// 更新
function update(){
 document.getElementById("progress").innerText=`${current}/${end}`;
 document.getElementById("studentId").innerText=current;
}

// 投票
function vote(type){
 votes.push(type);

 if(type==="賛成") agree++;
 if(type==="反対") disagree++;
 if(type==="欠席") absent++;

 current++;
 current>end?showResult():update();
}

// 結果
function showResult(){
 document.getElementById("voteArea").style.display="none";
 document.getElementById("resultArea").style.display="block";

 document.getElementById("resultText").innerHTML=
  `賛成:${agree}<br>反対:${disagree}<br>欠席:${absent}`;

 if(role==="child2"){
  let data=`ROSTA|${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`;

  let box=document.createElement("div");
  box.style.background="white";
  document.getElementById("qrArea").appendChild(box);

  new QRCode(box,{text:data,width:250,height:250});
 }
}

// 送信
function submitData(){
 if(isSending) return;
 isSending=true;

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({
   class:cls,
   code:voteCodeGlobal,
   agree,
   disagree,
   absent
  })
 })
 .then(()=>{alert("送信成功");location.reload();})
 .catch(()=>{
  alert("失敗");
  isSending=false;
 });
}
</script>

</body>
</html>
