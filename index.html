<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│完成版</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
 margin:0;
 background:#111;
 color:white;
 font-family:sans-serif;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.container{
 width:100%;
 max-width:1100px;
 height:95%;
}

.card{
 width:100%;
 height:100%;
 text-align:center;
 position:relative;
}

.qr-btn{
 font-size:28px;
 padding:15px 30px;
 margin:10px;
}

.big-text{
 font-size:60px;
 font-weight:bold;
}

.vote-main{
 display:flex;
 height:60%;
}

.vote-half{
 flex:1;
 font-size:70px;
 border:none;
}

.agree{background:#ff3b3b;}
.disagree{background:#2f6bff;}

.absent{
 width:100%;
 height:120px;
 font-size:40px;
 background:#444;
 border:none;
}

#progress{font-size:30px;}
#studentId{font-size:60px;font-weight:bold;}

.back-btn{
 position:absolute;
 top:10px;
 left:10px;
 font-size:20px;
}

/* ユーザー表示 */
#userBar{
 position:absolute;
 top:10px;
 left:10px;
 background:#222;
 padding:10px 15px;
 border-radius:10px;
 cursor:pointer;
 z-index:100;
 display:none;
}

#dropdown{
 display:none;
 margin-top:10px;
 background:#333;
 border-radius:8px;
}
</style>
</head>

<body>
<div class="container">

<!-- 音 -->
<audio id="soundVote" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8f1b0f4c9.mp3"></audio>
<audio id="soundAbsent" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1b1f6b2e2f.mp3"></audio>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">

<h1 id="resultTitle" style="font-size:50px;"></h1>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:40px;gap:40px;">

  <!-- 左（結果） -->
  <div style="font-size:40px;">
    <div>賛成：<span id="agreeNum"></span></div>
    <div>反対：<span id="disagreeNum"></span></div>
    <div>欠席：<span id="absentNum"></span></div>
  </div>

  <!-- 中央（QR or カメラ） -->
  <div id="centerArea" style="width:260px;height:260px;display:flex;justify-content:center;align-items:center;">
    <div id="reader2" style="width:260px;height:260px;"></div>
    <div id="qrArea"></div>
  </div>

  <!-- 右（ボタン） -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <button id="mergeBtn" class="qr-btn" onclick="startMergeQR()">
      ① データ受信
    </button>

    <button id="sendBtn" class="qr-btn" onclick="submitData()" disabled>
      ② 生徒会に送信
    </button>

    <button id="homeBtn" class="qr-btn" onclick="goHome()">
      ③ ホームに戻る
    </button>

  </div>

</div>

<div id="loading" style="display:none;margin-top:20px;font-size:24px;">
送信中・・・
</div>

</div>
</div>

<script>

// 投票音
function playSound(type){
 if(type==="欠席"){
  document.getElementById("soundAbsent").play();
 }else{
  document.getElementById("soundVote").play();
 }
}

// ボタンアニメ
function pressEffect(btn){
 btn.style.transform="scale(0.9)";
 setTimeout(()=>btn.style.transform="scale(1)",100);
}

// 投票
function vote(type, el){
 pressEffect(el);
 playSound(type);

 votes.push(type);

 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;

 current++;
 current>end?showResult():update();
}

// 結果
function showResult(){

 document.getElementById("voteArea").style.display="none";
 document.getElementById("resultArea").style.display="block";

 document.getElementById("resultTitle").innerText=`${start}~${end}集計結果`;

 document.getElementById("agreeNum").innerText=agree;
 document.getElementById("disagreeNum").innerText=disagree;
 document.getElementById("absentNum").innerText=absent;

 let mergeBtn=document.getElementById("mergeBtn");
 let sendBtn=document.getElementById("sendBtn");
 let homeBtn=document.getElementById("homeBtn");

 let reader=document.getElementById("reader2");
 let qrArea=document.getElementById("qrArea");

 reader.innerHTML="";
 qrArea.innerHTML="";

 // 子機1
 if(role==="child1"){

  mergeBtn.style.background="#fff";
  mergeBtn.style.color="#000";

  sendBtn.style.background="#555";
  sendBtn.disabled=true;

  homeBtn.style.background="#555";

 }

 // 子機2
 if(role==="child2"){

  mergeBtn.style.display="none";
  sendBtn.style.display="none";

  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";

  let data=`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`;

  let box=document.createElement("div");
  box.style.background="white";
  box.style.padding="10px";

  qrArea.appendChild(box);

  new QRCode(box,{
   text:data,
   width:260,
   height:260
  });
 }
}

// QR受信
function startMergeQR(){

 if(isMerged) return; // ←再起動防止

 let reader=document.getElementById("reader2");
 reader.innerHTML="";

 mergeQr=new Html5Qrcode("reader2");

 mergeQr.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   if(mergeData(text)){
    mergeQr.stop();
   }
  }
 );
}

// 合体
function mergeData(text){

 let[c,code,a,d,ab]=text.split("|");

 if(c!==cls||code!==voteCodeGlobal){
  alert("コードエラー");
  return false;
 }

 agree+=+a;
 disagree+=+d;
 absent+=+ab;

 isMerged=true;

 document.getElementById("resultTitle").innerText=`${cls}集計結果`;

 document.getElementById("agreeNum").innerText=agree;
 document.getElementById("disagreeNum").innerText=disagree;
 document.getElementById("absentNum").innerText=absent;

 let mergeBtn=document.getElementById("mergeBtn");
 mergeBtn.innerText="受信済み";
 mergeBtn.style.background="#555";

 let sendBtn=document.getElementById("sendBtn");
 sendBtn.style.background="#fff";
 sendBtn.style.color="#000";
 sendBtn.disabled=false;

 alert("受信完了！");
 return true;
}

// 送信
function submitData(){

 if(role==="child1" && !isMerged){
  alert("先にデータ受信して");
  return;
 }

 let btn=document.getElementById("sendBtn");
 let loading=document.getElementById("loading");

 btn.disabled=true;
 btn.innerText="送信中...";
 loading.style.display="block";

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({class:cls,code:voteCodeGlobal,agree,disagree,absent})
 })
 .then(()=>{
  loading.innerText="送信完了！";

  let homeBtn=document.getElementById("homeBtn");
  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";

  alert("送信成功");
 })
 .catch(()=>{
  alert("送信失敗");
  btn.disabled=false;
  btn.innerText="② 生徒会に送信";
  loading.style.display="none";
 });
}

// ホーム
function goHome(){
 if(!confirm("ホームに戻る？"))return;
 location.reload();
}

</script>
</body>
</html>
</html>
