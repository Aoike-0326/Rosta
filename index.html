<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│v2.26.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --bg-color: #0f1115;
  --card-bg: rgba(30, 33, 40, 0.7);
  --text-main: #f3f4f6;
  --text-sub: #9ca3af;
  --accent: #6366f1;
  --agree-color: #ef4444;
  --disagree-color: #3b82f6;
  --absent-color: #374151;
}

body {
  margin: 0;
  background: var(--bg-color);
  background-image: radial-gradient(circle at 50% 0%, #1f2233 0%, #0f1115 80%);
  color: var(--text-main);
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  width: 100%;
  height: 100%;
  display: flex;
}

.card {
  flex: 1;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  width: 100%;
  height: 100%;
  padding: 40px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  box-sizing: border-box;
}

/* セットアップ・コード入力画面の大型化 */
#setup h2, #codeInput h2 { font-size: 40px; margin-bottom: 30px; }
#reader { 
  width: 500px !important; /* スキャナーを巨大化 */
  border-radius: 24px;
  border: 4px solid var(--accent);
  margin-bottom: 30px;
}
/* 投票開始ボタンの配置調整 */
/* --- コード入力画面のボタン配置修正 --- */
#codeInput .qr-btn-large {
  display: block;    /* 確実に改行させて下へ配置 */
  margin: 60px auto 0; 
  font-size: 32px;
  padding: 30px 100px;
  border-radius: 20px;
}

/* --- 投票画面：Chromebook最適化と空白削減 --- */
/* --- 投票画面：賛成・反対ボタンを最大化 --- */
#voteArea { 
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 10px 40px; /* 上下の余白を削ってボタンのスペースを確保 */
  box-sizing: border-box;
  justify-content: flex-start; 
  align-items: center;
}

#studentId { 
  font-size: 110px; 
  font-weight: 800; 
  margin: 5px 0; /* 番号の上下を詰めてボタンを上げる */
}

.vote-main {
  display: flex;
  width: 100%;
  justify-content: center;
  gap: 30px;
  /* ▽ 縦幅を 450px から 520px に拡大 */
  height: 320px; 
  flex-grow: 1; /* 余ったスペースをさらに活用 */
  margin-bottom: 30px; /* 欠席ボタンとの隙間を最小限に */
}

.vote-half {
  /* ▽ 比率を 1.2/1 から 1/1.1 に変更（より縦長を許可） */
  aspect-ratio: 2 / 1; 
  height: 100%; /* 親の 520px いっぱいに伸びる */
  
  font-size: 110px; /* 文字も少し大きく */
  font-weight: 800;
  border: none;
  border-radius: 60px; /* 大きさに合わせて角丸も少し強調 */
  color: white;
  cursor: pointer;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, filter 0.1s;
}

.absent {
  width: 100%;
  max-width: 1100px;
  height: 130px; /* 欠席ボタンを少しだけスリムにしてメインを優先 */
  font-size: 36px;
  font-weight: 700;
  background: var(--absent-color);
  color: white;
  border: none;
  border-radius: 24px;
  margin-bottom: 10px;
  flex-shrink: 0;
}

/* 色設定の維持 */
.agree { background: linear-gradient(145deg, #ff6b6b, var(--agree-color)) !important; }
.disagree { background: linear-gradient(145deg, #60a5fa, var(--disagree-color)) !important; }
.vote-half:active { transform: scale(0.96); filter: brightness(0.8); }

/* ユーザーバーの表示修正 */
#userBar {
  position: absolute;
  top: 30px;
  left: 30px;
  background: rgba(255,255,255,0.15);
  padding: 15px 25px;
  border-radius: 15px;
  z-index: 1000;
  font-size: 20px;
  font-weight: 700;
  display: none;
}

/* 結果画面 */
#reader2 {
  width: 400px;
  aspect-ratio: 1/1;
  margin: 30px auto;
  border-radius: 20px;
  border: 4px solid var(--accent);
}
.result-left { font-size: 40px; text-align: left; line-height: 1.6; }
.result-left span { font-size: 60px; font-weight: 800; margin-left: 30px; }

/* 共通パーツ */
.qr-btn {
  font-size: 24px; font-weight: 700; padding: 20px 50px;
  border: none; border-radius: 15px; background: var(--accent);
  color: white; cursor: pointer; transition: 0.2s;
}
input#voteCode {
  font-size: 60px; width: 400px; text-align: center;
  background: rgba(0,0,0,0.4); border: 3px solid var(--accent);
  color: white; border-radius: 20px; padding: 15px;
}
#backBtn {
  position: absolute; top: 30px; left: 30px;
  background: rgba(255,255,255,0.1); border: none; color: white;
  padding: 15px 30px; border-radius: 12px; font-size: 20px; font-weight: 600;
}
</style>
</head>

<body>
<div class="container">

<div id="userBar" onclick="toggleMenu()">
  <span id="userLabel"></span>
  <div id="dropdown" style="display:none; position:absolute; background:#222; width:100%; left:0; top:100%; border-radius:10px; margin-top:10px; border:1px solid #444;">
    <div onclick="logout()" style="padding:20px; color:#ff4d4d;">ログアウト</div>
  </div>
</div>

<div id="setup" class="card">
<h2 id="setupTitle">QRコードをスキャン</h2>
<div id="reader"></div>
<button id="qrBtn" class="qr-btn qr-btn-large" onclick="startQR()">スキャン開始</button>

<div id="afterScan" style="display:none;">
<button class="qr-btn qr-btn-large" onclick="selectRole('child1')" style="margin-right:20px;">評議委員 A</button>
<button class="qr-btn qr-btn-large" onclick="selectRole('child2')">評議委員 B</button>
</div>
</div>

<div id="codeInput" class="card" style="display:none;">
  <h2>投票コードを入力</h2>
  <input id="voteCode" type="text" placeholder="0000">
  <button class="qr-btn qr-btn-large" onclick="startVoting()">投票開始</button>
</div>

<div id="voteArea" class="card" style="display:none;">
<button id="backBtn" onclick="goBack()">← 戻る</button>

<div>
  <div id="progress"></div>
  <div id="studentId"></div>
</div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>
</div>

<div id="resultArea" class="card" style="display:none;">
<h1 id="resultTitle" style="font-size:48px;">集計結果</h1>

<div class="result-flex" style="display:flex; width:100%; justify-content:space-around; align-items:center;">
  <div class="result-left">
    賛成：<span id="agreeNum" style="color:var(--agree-color)">0</span><br>
    反対：<span id="disagreeNum" style="color:var(--disagree-color)">0</span><br>
    欠席：<span id="absentNum">0</span>
  </div>

  <div id="centerArea"></div>

  <div class="result-right" style="display:flex; flex-direction:column; gap:20px;">
    <button id="mergeBtn" class="qr-btn">① データ受信</button>
    <button id="sendBtn" class="qr-btn" onclick="submitData()" disabled style="background:#444;">② 生徒会に送信</button>
    <button id="homeBtn" class="qr-btn" onclick="goHome()" style="background:#444;">③ 終了</button>
  </div>
</div>
</div>

</div>

<script>
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;
let mergeQr;
let isMerged=false;

window.onload=()=>{
 let saved=localStorage.getItem("classData");
 if(saved){
  let d=JSON.parse(saved);
  cls=d.cls;start=d.start;end=d.end;role=d.role;
  setup.style.display="none";
  codeInput.style.display="block";
  updateUserBar();
 }
};

function startQR(){
 document.getElementById("qrBtn").style.display="none";
 html5QrCode=new Html5Qrcode("reader");
 html5QrCode.start(
  {facingMode:"environment"},
  {fps:10,qrbox:300},
  text=>{
   let data=JSON.parse(text);
   cls=data.class;
   ranges=data.ranges;
   html5QrCode.stop().then(() => {
     document.getElementById("reader").style.display="none";
     document.getElementById("setupTitle").innerText="役割を選択してください";
     afterScan.style.display="block";
   });
  }
 ).catch(()=>alert("カメラ起動失敗"));
}

function selectRole(r){
 let t=ranges.find(x=>x.role===r);
 start=t.start; end=t.end; role=r;
 localStorage.setItem("classData",JSON.stringify({cls,start,end,role}));
 setup.style.display="none";
 codeInput.style.display="block";
 updateUserBar();
}

// 修正点：ラベル表示のロジック
function updateUserBar(){
 let num=cls.replace("-","");
 let startId = `${num}${String(start).padStart(2,"0")}`;
 let endId = `${num}${String(end).padStart(2,"0")}`;
 
 userLabel.innerText= role==="child1" ? `評議委員A: ${startId} ~ ${endId}` : `評議委員B: ${startId} ~ ${endId}`;
 userBar.style.display="block";
}

function toggleMenu(){
 let dp = document.getElementById("dropdown");
 dp.style.display= dp.style.display==="block"?"none":"block";
}

function logout(){
 if(!confirm("ログアウトしますか？"))return;
 localStorage.clear();
 location.reload();
}

function startVoting(){
 let code=voteCode.value;
 if(!code)return alert("投票コードを入力してください");
 voteCodeGlobal=code;
 if(!confirm(`${start}番から${end}番まで開始しますか？`))return;
 current=start;
 codeInput.style.display="none";
 voteArea.style.display="block";
 userBar.style.display="none";
 update();
}

function update(){
 progress.innerText=`${current} / ${end}`;
 let num=cls.replace("-","");
 studentId.innerText= `${num}${String(current).padStart(2,"0")}`;
}

function vote(type){
 votes.push(type);
 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;
 current++;
 current>end?showResult():update();
}

function goBack(){
 if(current===start)return;
 if(!confirm("１つ前の投票に戻りますか？"))return;
 current--;
 let last=votes.pop();
 if(last==="賛成")agree--;
 if(last==="反対")disagree--;
 if(last==="欠席")absent--;
 update();
}

function showResult(){
 voteArea.style.display="none";
 resultArea.style.display="block";
 userBar.style.display="block";
 resultTitle.innerText=`集計結果 (${cls})`;
 agreeNum.innerText=agree;
 disagreeNum.innerText=disagree;
 absentNum.innerText=absent;

 let center=document.getElementById("centerArea");
 center.innerHTML="";

 if(role==="child1"){
  let reader=document.createElement("div");
  reader.id="reader2";
  center.appendChild(reader);
  mergeBtn.onclick=startMergeQR;
 }

 if(role==="child2"){
  let box=document.createElement("div");
  box.id="qrBox";
  box.style.background="white";
  box.style.padding="20px";
  box.style.borderRadius="20px";
  center.appendChild(box);
  new QRCode(box,{
   text:`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`,
   width:300,height:300
  });
  mergeBtn.style.display="none";
  sendBtn.style.display="none";
  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";
 }
}

function startMergeQR(){
 if(isMerged)return;
 mergeQr=new Html5Qrcode("reader2");
 mergeQr.start({facingMode:"environment"},{fps:10,qrbox:250},
 text=>{
  let [c,code,a,d,ab]=text.split("|");
  if(c!==cls||code!==voteCodeGlobal){
   alert("データ不一致");
   return;
  }
  mergeQr.stop().then(() => {
    document.getElementById("reader2").style.display="none";
    agree+=+a; disagree+=+d; absent+=+ab;
    agreeNum.innerText=agree; disagreeNum.innerText=disagree; absentNum.innerText=absent;
    isMerged=true;
    sendBtn.disabled=false;
    sendBtn.style.background="var(--accent)";
    mergeBtn.style.display="none";
    alert("同期完了");
  });
 });
}

function submitData(){
 const btn = document.getElementById("sendBtn");
 if(role !== "child1") return;
 if(!isMerged) return;

 btn.disabled = true;
 btn.innerText = "送信中...";

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({ class:cls, code:voteCodeGlobal, agree, disagree, absent })
 })
 .then(()=>{
  btn.innerText = "送信完了";
  btn.style.background = "#222";
  document.getElementById("homeBtn").style.background = "#fff";
  document.getElementById("homeBtn").style.color = "#000";
  alert("送信成功");
 })
 .catch(()=>{
  btn.innerText = "送信失敗";
  btn.disabled = false;
  alert("送信失敗");
 });
}

function goHome(){
 if(!confirm("ホームに戻りますか？")) return;
 location.reload();
}

window.addEventListener("beforeunload", function (e) {
 if(document.getElementById("voteArea").style.display === "block"){
  e.preventDefault(); e.returnValue = "";
 }
});
</script>

</body>
</html>
