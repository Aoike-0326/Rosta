<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│ルスタ17</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
 background:#111;color:white;font-family:sans-serif;
 display:flex;justify-content:center;align-items:center;height:100vh;margin:0;
}
.container{width:100%;max-width:1000px;height:95%;}
.card{text-align:center;height:100%;position:relative;}
.qr-btn{font-size:28px;padding:15px 30px;margin:10px;}
.big{font-size:50px;font-weight:bold;}
.vote{display:flex;height:70%;}
.vote button{flex:1;font-size:60px;border:none;}
.agree{background:#ff3b3b;}
.disagree{background:#2f6bff;}
.absent{width:100%;height:120px;font-size:40px;background:#444;}
.back{position:absolute;top:10px;left:10px;font-size:20px;}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">
<h2>クラスQR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
<div class="big">役割選択</div>
<button class="qr-btn" onclick="selectRole('child1')">子機1</button>
<button class="qr-btn" onclick="selectRole('child2')">子機2</button>
</div>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:30px;">
<br>
<button class="qr-btn" onclick="startVoting()">開始</button>
<button class="qr-btn" onclick="resetAll()">設定リセット</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">
<button class="back" onclick="goBack()">戻る</button>

<div id="progress"></div>
<div id="studentId" class="big"></div>

<div class="vote">
<button class="agree" onclick="vote('賛成')">賛成</button>
<button class="disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>
</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">

<div id="resultText" class="big"></div>

<!-- 子機1 -->
<div id="mergeArea" style="display:none;">
<div class="big">子機データ受信</div>
<button class="qr-btn" onclick="startMergeQR()">QR読み取り</button>
<div id="reader2" style="width:300px;margin:auto;"></div>
</div>

<!-- 子機2 -->
<div id="qrArea"></div>

<button id="sendBtn" class="qr-btn" onclick="submitData()" style="display:none;">
生徒会に送信
</button>

</div>

</div>

<script>
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;

// 起動時
window.onload=()=>{
 let saved=localStorage.getItem("classData");
 if(saved){
  let d=JSON.parse(saved);
  cls=d.cls;start=d.start;end=d.end;role=d.role;
  document.getElementById("setup").style.display="none";
  document.getElementById("codeInput").style.display="block";
 }
};

// QR開始
function startQR(){
 html5QrCode=new Html5Qrcode("reader");
 html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},
 text=>{
  let data=JSON.parse(text);
  cls=data.class;
  ranges=data.ranges;
  html5QrCode.stop();
  document.getElementById("afterScan").style.display="block";
 });
}

// 子機選択
function selectRole(r){
 let target=ranges.find(x=>x.role===r);
 start=target.start;
 end=target.end;
 role=r;

 localStorage.setItem("classData",JSON.stringify({cls,start,end,role}));

 document.getElementById("setup").style.display="none";
 document.getElementById("codeInput").style.display="block";
}

// リセット
function resetAll(){
 localStorage.clear();
 location.reload();
}

// 投票開始
function startVoting(){
 let code=document.getElementById("voteCode").value;
 if(!code)return alert("コード入れて");

 voteCodeGlobal=code;

 if(!confirm(`${start}〜${end}で開始する？`))return;

 current=start;
 document.getElementById("codeInput").style.display="none";
 document.getElementById("voteArea").style.display="block";

 update();
}

// 更新
function update(){
 document.getElementById("progress").innerText=`${current}/${end}`;
 let[g,c]=cls.split("-");
 document.getElementById("studentId").innerText=`${g}${c}${String(current).padStart(2,"0")}`;
}

// 投票
function vote(type){
 votes.push(type);
 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;

 current++;
 current>end?showResult():update();
}

// 戻る
function goBack(){
 if(current===start)return;
 if(!confirm("戻る？"))return;

 current--;
 let last=votes.pop();
 if(last==="賛成")agree--;
 if(last==="反対")disagree--;
 if(last==="欠席")absent--;

 update();
}

// 結果
function showResult(){
 document.getElementById("voteArea").style.display="none";
 document.getElementById("resultArea").style.display="block";

 document.getElementById("resultText").innerHTML=
 `賛成:${agree}<br>反対:${disagree}<br>欠席:${absent}`;

 if(role==="child1"){
  document.getElementById("mergeArea").style.display="block";
 }else{
  let data=`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`;
  let box=document.createElement("div");
  box.style.background="white";box.style.padding="10px";
  document.getElementById("qrArea").appendChild(box);
  new QRCode(box,{text:data,width:250,height:250});
 }
}

// 合体
function startMergeQR(){
 let qr=new Html5Qrcode("reader2");
 qr.start({facingMode:"environment"},{fps:10,qrbox:250},
 text=>{
  let[pcls,code,a,d,ab]=text.split("|");

  if(pcls!==cls||code!==voteCodeGlobal){
   alert("コードエラー");
   return;
  }

  agree+=+a;disagree+=+d;absent+=+ab;

  document.getElementById("resultText").innerHTML=
  `合計<br>賛成:${agree}<br>反対:${disagree}<br>欠席:${absent}`;

  document.getElementById("sendBtn").style.display="block";

  qr.stop();
 });
}

// 送信
function submitData(){
 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({class:cls,code:voteCodeGlobal,agree,disagree,absent})
 }).then(()=>alert("送信成功"));
}
</script>

</body>
</html>
