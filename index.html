<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│17</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body { height:100%; margin:0; }
body {
  background:#111;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container { width:100%; max-width:1200px; height:95%; }
.card { width:100%; height:100%; text-align:center; position:relative; }

.qr-btn {
  font-size:30px;
  padding:20px;
  margin:15px;
}

.vote-main { display:flex; flex:1; }
.vote-half {
  flex:1;
  font-size:60px;
  border:none;
}
.vote-half:active { transform:scale(0.95); }

.agree { background:#ff3b3b; }
.disagree { background:#2f6bff; }

.absent {
  width:100%;
  height:120px;
  font-size:40px;
  background:#444;
}

.back-btn {
  position:absolute;
  top:10px;
  left:10px;
  font-size:25px;
}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
<div id="scanResult"></div>
<button class="qr-btn" onclick="confirmSetup()">次へ</button>
</div>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード</h2>
<input id="voteCode" style="font-size:30px;">
<br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">
<button class="back-btn" onclick="goBack()">戻る</button>

<div id="progress"></div>
<div id="studentId"></div>

<div id="child2Area" style="display:none;">
<div id="child2QR"></div>
<button onclick="startVoteAfterQR()">次へ</button>
</div>

<div id="voteButtons" style="display:none;">
<button class="vote-half agree" onclick="vote('賛成')">賛成</button>
<button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button id="absentBtn" onclick="vote('欠席')" style="display:none;">欠席</button>
</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">
<h2>結果</h2>
<div id="resultText"></div>

<button onclick="startMergeQR()">QR読み取り</button>
<div id="mergeReader"></div>

<div id="qrArea"></div>
</div>

</div>

<script>
let cls="", ranges=[], role="";
let start=1, end=0, current;
let agree=0, disagree=0, absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;

// QR開始
function startQR(){
 html5QrCode = new Html5Qrcode("reader");
 html5QrCode.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  text=>{
    onScanSuccess(text);
    html5QrCode.stop();
  }
 );
}

// QR読み取り
function onScanSuccess(text){
 try{
  let data = JSON.parse(text);
  cls = data.class;
  ranges = data.ranges;

  start = ranges[0].start;
  end = ranges[0].end;
  role = "child1";

 }catch{
  let p = text.split("|");
  cls = p[0];
  start = +p[1];
  end = +p[2];
  voteCodeGlobal = p[3];
  role = "child2";
 }

 document.getElementById("afterScan").style.display="block";

 if(role==="child2"){
  document.getElementById("scanResult").innerHTML =
   `<h1>${start}〜${end}</h1>`;
 }else{
  document.getElementById("scanResult").innerText =
   `${cls} ${start}〜${end}`;
 }
}

// 次へ
function confirmSetup(){
 if(role==="child2"){
  startVotingDirect();
 }else{
  document.getElementById("setup").style.display="none";
  document.getElementById("codeInput").style.display="block";
 }
}

// 子機2QR生成
function generateChild2QR(){
 let start2 = ranges[1].start;
 let end2 = ranges[1].end;

 let data = `${cls}|${start2}|${end2}|${voteCodeGlobal}`;

 let box = document.getElementById("child2QR");
 box.innerHTML="";
 box.style.background="white";
 box.style.padding="10px";

 new QRCode(box,{ text:data });

 document.getElementById("child2Area").style.display="block";
}

// 投票開始（子機1）
function startVoting(){
 let code = document.getElementById("voteCode").value;

 voteCodeGlobal = code;

 generateChild2QR();

 document.getElementById("codeInput").style.display="none";
 document.getElementById("voteArea").style.display="block";
}

// 子機2開始
function startVotingDirect(){
 current = start;

 document.getElementById("setup").style.display="none";
 document.getElementById("voteArea").style.display="block";

 showVotingUI();
}

// QR後開始
function startVoteAfterQR(){
 current = start;
 document.getElementById("child2Area").style.display="none";
 showVotingUI();
}

// UI
function showVotingUI(){
 document.getElementById("voteButtons").style.display="flex";
 document.getElementById("absentBtn").style.display="block";
 update();
}

// 更新
function update(){
 document.getElementById("progress").innerText = `${current}/${end}`;
 document.getElementById("studentId").innerText = current;
}

// 投票
function vote(type){
 votes.push(type);

 if(type==="賛成") agree++;
 if(type==="反対") disagree++;
 if(type==="欠席") absent++;

 current++;

 if(current>end) showResult();
 else update();
}

// 戻る
function goBack(){
 if(current===start) return;

 current--;
 let last = votes.pop();

 if(last==="賛成") agree--;
 if(last==="反対") disagree--;
 if(last==="欠席") absent--;

 update();
}

// 結果
function showResult(){
 document.getElementById("voteArea").style.display="none";
 document.getElementById("resultArea").style.display="block";

 document.getElementById("resultText").innerHTML =
  `賛成:${agree}<br>反対:${disagree}<br>欠席:${absent}`;

 if(role==="child2"){
  let data = `${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`;

  let box = document.createElement("div");
  box.style.background="white";
  box.style.padding="10px";

  document.getElementById("qrArea").appendChild(box);
  new QRCode(box,{ text:data });
 }
}

// 合体
function startMergeQR(){
 let qr = new Html5Qrcode("mergeReader");

 qr.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  text=>{
    mergeData(text);
    qr.stop();
  }
 );
}

function mergeData(text){
 let [c,code,a,d,ab] = text.split("|");

 if(c!==cls || code!==voteCodeGlobal){
  alert("不一致");
  return;
 }

 agree+=+a;
 disagree+=+d;
 absent+=+ab;

 document.getElementById("resultText").innerHTML =
  `賛成:${agree}<br>反対:${disagree}<br>欠席:${absent}`;
}
</script>

</body>
</html>
