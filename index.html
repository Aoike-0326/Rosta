<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│完成版1</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
 margin:0;
 background:#111;
 color:white;
 font-family:sans-serif;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.container{
 width:100%;
 max-width:1100px;
 height:95%;
}

.card{
 width:100%;
 height:100%;
 text-align:center;
 position:relative;
}

.qr-btn{
 font-size:26px;
 padding:14px 24px;
 margin:10px;
 border:none;
 border-radius:10px;
}

.vote-main{
 display:flex;
 height:60%;
}

.vote-half{
 flex:1;
 font-size:70px;
 border:none;
 transition:0.1s;
}
.vote-half:active{
 transform:scale(0.93);
 filter:brightness(0.8);
}

.absent{
 width:100%;
 height:120px;
 font-size:40px;
 background:#444;
 border:none;
 transition:0.1s;
}
.absent:active{
 transform:scale(0.93);
}

.agree{background:#ff3b3b;}
.disagree{background:#2f6bff;}

#progress{font-size:30px;}
#studentId{font-size:60px;font-weight:bold;}

#userBar{
 position:absolute;
 top:10px;
 left:10px;
 background:#222;
 padding:10px 15px;
 border-radius:10px;
 cursor:pointer;
 display:none;
}

#dropdown{
 display:none;
 margin-top:10px;
 background:#333;
 border-radius:8px;
}

.result-flex{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-top:40px;
}

.result-left{
 text-align:left;
 font-size:40px;
}

.result-right{
 display:flex;
 flex-direction:column;
 gap:15px;
}

#reader2{
 width:260px;
 height:260px;
}

#qrBox{
 background:white;
 padding:10px;
}
 #backBtn{
 position:absolute;
 top:10px;
 left:10px;
 font-size:20px;
 padding:10px 15px;
 z-index:100;
}
</style>
</head>

<body>
<div class="container">

<div id="userBar" onclick="toggleMenu()">
  <span id="userLabel"></span>
  <div id="dropdown">
    <div onclick="logout()" style="padding:10px;">ログアウト</div>
  </div>
</div>

<!-- QR -->
<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button id="qrBtn" class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
<h2>役割選択</h2>
<button class="qr-btn" onclick="selectRole('child1')">子機1</button>
<button class="qr-btn" onclick="selectRole('child2')">子機2</button>
</div>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:30px;">
<br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">
<button id="backBtn" onclick="goBack()">戻る</button>

<div id="progress"></div>
<div id="studentId"></div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>
</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">

<h1 id="resultTitle"></h1>

<div class="result-flex">

<div class="result-left">
  賛成：<span id="agreeNum"></span><br>
  反対：<span id="disagreeNum"></span><br>
  欠席：<span id="absentNum"></span>
</div>

<div id="centerArea"></div>

<div class="result-right">
<button id="mergeBtn" class="qr-btn">① データ受信</button>

<button id="sendBtn" class="qr-btn" disabled style="background:#555;">
② 生徒会に送信
</button>

<button id="homeBtn" class="qr-btn" onclick="goHome()" style="background:#555;">
③ ホームに戻る
</button>

<div id="loading" style="display:none;">送信中...</div>
</div>

</div>
</div>

</div>

<script>
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;
let mergeQr;
let isMerged=false;

window.onload=()=>{
 let saved=localStorage.getItem("classData");
 if(saved){
  let d=JSON.parse(saved);
  cls=d.cls;start=d.start;end=d.end;role=d.role;

  setup.style.display="none";
  codeInput.style.display="block";
  updateUserBar();
 }
};

function startQR(){
 document.getElementById("qrBtn").style.display="none";

 html5QrCode=new Html5Qrcode("reader");

 html5QrCode.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   let data=JSON.parse(text);
   cls=data.class;
   ranges=data.ranges;
   html5QrCode.stop();
   afterScan.style.display="block";
  }
 ).catch(()=>alert("カメラ起動失敗"));
}

function selectRole(r){
 let t=ranges.find(x=>x.role===r);
 start=t.start; end=t.end; role=r;

 localStorage.setItem("classData",JSON.stringify({cls,start,end,role}));

 setup.style.display="none";
 codeInput.style.display="block";
 updateUserBar();
}

function updateUserBar(){
 let base=cls.replace("-","");
 userLabel.innerText=
 role==="child1"
 ? `評議委員A ${base}${start}~${base}${end}`
 : `評議委員B ${base}${start}~${base}${end}`;

 userBar.style.display="block";
}

function toggleMenu(){
 dropdown.style.display=
 dropdown.style.display==="block"?"none":"block";
}

function logout(){
 if(!confirm("リセットする？"))return;
 localStorage.clear();
 location.reload();
}

function startVoting(){
 let code=voteCode.value;
 if(!code)return alert("コード入れて");

 voteCodeGlobal=code;

 if(!confirm(`${start}〜${end}で開始する？`))return;

 current=start;
 codeInput.style.display="none";
 voteArea.style.display="block";
 userBar.style.display="none";

 update();
}

function update(){
 progress.innerText=`${current}/${end}`;
 let num=cls.replace("-","");
 studentId.innerText=
 `${num}${String(current).padStart(2,"0")}`;
}

function vote(type){
 votes.push(type);
 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;

 current++;
 current>end?showResult():update();
}

function goBack(){
 if(current===start)return;
 if(!confirm("戻る？"))return;

 current--;
 let last=votes.pop();
 if(last==="賛成")agree--;
 if(last==="反対")disagree--;
 if(last==="欠席")absent--;

 update();
}

function showResult(){
 voteArea.style.display="none";
 resultArea.style.display="block";
 userBar.style.display="block";

 resultTitle.innerText=`${start}~${end}集計結果`;
 agreeNum.innerText=agree;
 disagreeNum.innerText=disagree;
 absentNum.innerText=absent;

 let center=document.getElementById("centerArea");
 center.innerHTML="";

 if(role==="child1"){
  let reader=document.createElement("div");
  reader.id="reader2";
  center.appendChild(reader);

  mergeBtn.onclick=startMergeQR;
 }

 if(role==="child2"){
  let box=document.createElement("div");
  box.id="qrBox";
  center.appendChild(box);

  new QRCode(box,{
   text:`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`,
   width:240,height:240
  });

  mergeBtn.style.display="none";
  sendBtn.style.display="none";

  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";
 }
}

function startMergeQR(){
 if(isMerged)return;

 mergeQr=new Html5Qrcode("reader2");

 mergeQr.start({facingMode:"environment"},{fps:10,qrbox:250},
 text=>{
  let [c,code,a,d,ab]=text.split("|");

  if(c!==cls||code!==voteCodeGlobal){
   alert("コードエラー");
   return;
  }

  mergeQr.stop();

  agree+=+a;
  disagree+=+d;
  absent+=+ab;

  agreeNum.innerText=agree;
  disagreeNum.innerText=disagree;
  absentNum.innerText=absent;

  isMerged=true;

  sendBtn.disabled=false;
  sendBtn.style.background="#fff";
  sendBtn.style.color="#000";

  mergeBtn.style.background="#555";

  alert("受信完了");
 });
}

function submitData(){

 // ★ 子機2は送信禁止
 if(role !== "child1"){
  alert("この端末では送信できません");
  return;
 }

 // ★ 子機1でも未受信ならNG
 if(!isMerged){
  alert("先にデータ受信して");
  return;
 }

 let btn=sendBtn;
 let loading=document.getElementById("loading");

 btn.disabled=true;
 loading.style.display="block";

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({class:cls,code:voteCodeGlobal,agree,disagree,absent})
 })
 .then(()=>{
  loading.innerText="送信完了";
  homeBtn.style.background="#fff";
  homeBtn.style.color="#000";
  alert("送信成功");
 })
 .catch(()=>{
  alert("送信失敗");
  btn.disabled=false;
 });
}

function goHome(){
 if(!confirm("戻る？"))return;
 location.reload();
}
</script>

</body>
</html>
