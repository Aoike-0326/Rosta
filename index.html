<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│v2.26.13</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --bg-color: #0f1115;
  --card-bg: rgba(30, 33, 40, 0.7);
  --text-main: #f3f4f6;
  --text-sub: #9ca3af;
  --accent: #6366f1;
  --agree-color: #ef4444;
  --disagree-color: #3b82f6;
  --absent-color: #374151;
}

body {
  margin: 0;
  background: var(--bg-color);
  background-image: radial-gradient(circle at 50% 0%, #1f2233 0%, #0f1115 80%);
  color: var(--text-main);
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container { width: 100%; height: 100%; display: flex; }

.card {
  flex: 1;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  padding: 40px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  box-sizing: border-box;
}

/* ヘッダー・ユーザー情報 */
#userBar {
  position: absolute; top: 30px; left: 30px;
  background: rgba(255,255,255,0.15); padding: 12px 25px;
  border-radius: 12px; z-index: 1000; font-size: 18px; font-weight: 700; display: none;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
}

/* セットアップ・コード入力 */
#setup h2, #codeInput h2 { font-size: 40px; margin-bottom: 30px; }
#reader { 
  width: 450px !important; border-radius: 24px;
  border: 4px solid var(--accent); margin-bottom: 30px;
}

/* 投票画面：Chromebook最適化 */
#voteArea { 
  display: flex; flex-direction: column; height: 100vh;
  padding: 10px 40px; box-sizing: border-box;
  justify-content: flex-start; align-items: center;
}

#progress { font-size: 22px; font-weight: 600; color: var(--text-sub); margin-top: 15px; }

#studentId { 
  font-size: 110px; font-weight: 800; margin: 0; line-height: 1.0; 
}

.privacy-note {
  display: inline-block; font-size: 16px; color: #fbbf24;
  background: rgba(251, 191, 36, 0.1); padding: 6px 20px;
  border-radius: 20px; margin: 10px 0 15px; font-weight: 500;
}

.vote-main {
  display: flex; width: 100%; justify-content: center;
  gap: 25px; height: 320px; margin-bottom: 15px;
}

.vote-half {
  flex: 1; height: 100%; font-size: 100px; font-weight: 800;
  border: none; border-radius: 50px; color: white; cursor: pointer;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s;
}
.agree { background: linear-gradient(145deg, #ff6b6b, var(--agree-color)) !important; }
.disagree { background: linear-gradient(145deg, #60a5fa, var(--disagree-color)) !important; }
.vote-half:active { transform: scale(0.95); }

.absent {
  width: 100%; max-width: 1000px; height: 100px;
  font-size: 32px; font-weight: 700; background: var(--absent-color);
  color: white; border: none; border-radius: 20px; flex-shrink: 0;
}

/* クレジット */
.credit {
  position: fixed; bottom: 15px; right: 20px; text-align: right;
  font-size: 12px; color: #6b7280; line-height: 1.4; pointer-events: none; z-index: 9999;
}

/* 共通ボタン・入力 */
.qr-btn {
  font-size: 24px; font-weight: 700; padding: 20px 60px;
  border: none; border-radius: 15px; background: var(--accent);
  color: white; cursor: pointer;
}
/* 入力欄のスタイル（幅を少し調整） */
input#voteCode {
  font-size: 60px; 
  width: 350px; 
  text-align: center;
  background: rgba(0,0,0,0.4); 
  border: 3px solid var(--accent);
  color: white; 
  border-radius: 20px; 
  padding: 15px;
  display: block;    /* ブロック要素にして中央寄せしやすくする */
  margin: 0 auto;    /* 中央寄せ */
}

/* 投票開始ボタンのスタイル（すぐ下に配置） */
#startVoteBtn {
  margin-top: 25px;  /* 入力欄との隙間を「25px」に設定 */
  display: inline-block;
  /* 他の .qr-btn のスタイルは継承されます */
}
#backBtn {
  position: absolute; top: 30px; left: 30px; background: rgba(255,255,255,0.1);
  border: none; color: white; padding: 12px 25px; border-radius: 10px; font-size: 18px;
}
</style>
</head>

<body>
<div class="credit">©️つちやあおい<br>User Interface Arranger : Gemini</div>
  
<div class="container">
  <div id="userBar" onclick="toggleMenu()">
    <span id="userLabel"></span>
    <div id="dropdown" style="display:none; position:absolute; background:#222; width:100%; left:0; top:100%; border-radius:10px; margin-top:10px; border:1px solid #444; overflow:hidden;">
      <div onclick="logout()" style="padding:15px; color:#ff4d4d; font-size:16px;">ログアウト</div>
    </div>
  </div>

  <div id="setup" class="card">
    <h2 id="setupTitle">QRコードをスキャン</h2>
    <div id="reader"></div>
    <button id="qrBtn" class="qr-btn" onclick="startQR()">スキャン開始</button>
    <div id="afterScan" style="display:none;">
      <button class="qr-btn" onclick="selectRole('child1')" style="margin-right:20px;">評議員 A</button>
      <button class="qr-btn" onclick="selectRole('child2')">評議員 B</button>
    </div>
  </div>

 <div id="codeInput" class="card" style="display:none;">
  <h2>投票コードを入力</h2>
  <input id="voteCode" type="text" placeholder="0000" maxlength="4">
  <button class="qr-btn" onclick="startVoting()" id="startVoteBtn">投票開始</button>
</div>

  <div id="voteArea" class="card" style="display:none;">
    <button id="backBtn" onclick="goBack()">← 戻る</button>
    <div id="progress"></div>
    <div id="studentId"></div>
    <div class="privacy-note">個人の投票は送信されません。総計が送信されます</div>
    
    <div class="vote-main">
      <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
      <button class="vote-half disagree" onclick="vote('反対')">反対</button>
    </div>
    <button class="absent" onclick="vote('欠席')">欠席</button>
  </div>

  <div id="resultArea" class="card" style="display:none;">
    <h1 id="resultTitle" style="font-size:42px; margin-bottom:30px;">集計結果</h1>
    <div style="display:flex; width:100%; justify-content:space-around; align-items:center;">
      <div style="font-size:36px; text-align:left; line-height:1.8;">
        賛成：<span id="agreeNum" style="color:var(--agree-color); font-weight:800;">0</span><br>
        反対：<span id="disagreeNum" style="color:var(--disagree-color); font-weight:800;">0</span><br>
        欠席：<span id="absentNum" style="font-weight:800;">0</span>
      </div>
      <div id="centerArea"></div>
      <div style="display:flex; flex-direction:column; gap:15px;">
        <button id="mergeBtn" class="qr-btn">① データ受信</button>
        <button id="sendBtn" class="qr-btn" onclick="submitData()" disabled style="background:#444;">② 生徒会に送信</button>
        <button id="homeBtn" class="qr-btn" onclick="goHome()" style="background:#222;">③ 終了</button>
      </div>
    </div>
  </div>
</div>

<script>
let cls="", ranges=[], role="", start=1, end=0, current;
let agree=0, disagree=0, absent=0, voteCodeGlobal="", votes=[], isMerged=false;
let html5QrCode, mergeQr;

const soundAgree = new Audio('1.mp3');
const soundAbsent = new Audio('2.mp3');

// --- 起動時処理（キャッシュ復元） ---
window.onload = () => {
  let saved = localStorage.getItem("classData");
  if (saved) {
    let d = JSON.parse(saved);
    cls = d.cls; start = d.start; end = d.end; role = d.role;
    document.getElementById("setup").style.display = "none";
    document.getElementById("codeInput").style.display = "block";
    updateUserBar();
  }
};

// --- リロード防止ポップアップ ---
// --- 修正：リロード防止ポップアップ ---
// --- 修正：リロード防止ポップアップ ---
window.addEventListener("beforeunload", (e) => {
  const isVoting = document.getElementById("voteArea").style.display === "block";
  const isResult = document.getElementById("resultArea").style.display === "block";
  const sendBtn = document.getElementById("sendBtn");

  // 評議員A（送信ボタンがある側）かつ、送信が完了していない場合のみ警告
  // 評議員Bや、送信済みのAは警告を出さない
  if (isVoting) {
    e.preventDefault();
    e.returnValue = "入力中のデータが消去されます。";
    return e.returnValue;
  }

  // 評議員A限定：送信完了ボタンが表示されている間は、未送信なら警告
  if (isResult && role === "child1" && sendBtn && sendBtn.innerText !== "送信完了") {
    e.preventDefault();
    e.returnValue = "送信が完了していません。データが消去されます。";
    return e.returnValue;
  }
});

function unlockAudio() {
  soundAgree.play().then(()=> { soundAgree.pause(); soundAgree.currentTime=0; }).catch(e=>console.log(e));
  soundAbsent.play().then(()=> { soundAbsent.pause(); soundAbsent.currentTime=0; }).catch(e=>console.log(e));
}

function startQR(){
  unlockAudio();
  document.getElementById("qrBtn").style.display="none";
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:280}, text => {
    let data = JSON.parse(text);
    cls = data.class; ranges = data.ranges;
    html5QrCode.stop().then(() => {
      document.getElementById("reader").style.display="none";
      document.getElementById("setupTitle").innerText="役割を選択";
      document.getElementById("afterScan").style.display="block";
    });
  }).catch(()=>alert("カメラの起動に失敗しました。"));
}

function selectRole(r){
  let t = ranges.find(x => x.role === r);
  start = t.start; end = t.end; role = r;
  localStorage.setItem("classData", JSON.stringify({cls, start, end, role}));
  document.getElementById("setup").style.display = "none";
  document.getElementById("codeInput").style.display = "block";
  updateUserBar();
}

function updateUserBar(){
  let num = cls.replace("-","");
  let sId = `${num}${String(start).padStart(2,"0")}`, eId = `${num}${String(end).padStart(2,"0")}`;
  let roleName = (role === 'child1') ? '評議員A' : '評議員B';
  document.getElementById("userLabel").innerText = `${roleName}: ${sId} ~ ${eId}`;
  document.getElementById("userBar").style.display = "block";
}

function startVoting(){
  let code = document.getElementById("voteCode").value;
  if(!["0248","8931","2410","1012","3261","7214","0000"].includes(code)) return alert("無効な投票コードです。");
  voteCodeGlobal = code;
  if(!confirm(`${start}番から${end}番まで投票を開始します。よろしいですか？`)) return;
  current = start;
  document.getElementById("codeInput").style.display="none";
  document.getElementById("voteArea").style.display="block";
  document.getElementById("userBar").style.display="none"; // 投票中は隠す
  update();
}

function update(){
  document.getElementById("progress").innerText = `${current} / ${end}`;
  let num = cls.replace("-","");
  document.getElementById("studentId").innerText = `${num}${String(current).padStart(2,"0")}`;
}

// --- 修正：投票アクション ---
function vote(type){
  if(type==="欠席") { 
    soundAbsent.currentTime=0; 
    soundAbsent.play(); 
    absent++; 
  } else { 
    soundAgree.currentTime=0; 
    soundAgree.play(); 
    type==="賛成" ? agree++ : disagree++; 
  }
  votes.push(type); 
  current++;

  if (current > end) {
    // ▽ 全員の投票が終わった瞬間にアラートを出す ▽
    alert("投票が完了しました。評議員に渡してください。");
    showResult();
  } else {
    update();
  }
}

function goBack(){
  if(current===start) return;
  if(!confirm("前の番号に戻りますか？")) return;
  current--; let last = votes.pop();
  if(last==="賛成") agree--; else if(last==="反対") disagree--; else absent--;
  update();
}

function showResult(){
  document.getElementById("voteArea").style.display="none";
  document.getElementById("resultArea").style.display="block";
  document.getElementById("userBar").style.display="block";
  document.getElementById("agreeNum").innerText=agree;
  document.getElementById("disagreeNum").innerText=disagree;
  document.getElementById("absentNum").innerText=absent;
  let center = document.getElementById("centerArea");
  if(role==="child1"){
    let r = document.createElement("div"); r.id="reader2"; r.style.width="320px"; r.style.height="320px"; r.style.border="4px solid var(--accent)"; r.style.borderRadius="20px";
    center.appendChild(r); document.getElementById("mergeBtn").onclick = startMergeQR;
  } else {
    let b = document.createElement("div"); b.id="qrBox"; b.style.padding="15px"; b.style.background="white"; b.style.borderRadius="15px";
    center.appendChild(b); new QRCode(b, {text:`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`, width:280, height:280});
    document.getElementById("mergeBtn").style.display="none"; document.getElementById("sendBtn").style.display="none";
  }
}

function startMergeQR(){
  mergeQr = new Html5Qrcode("reader2");
  mergeQr.start({facingMode:"environment"}, {fps:10, qrbox:220}, text => {
    let [c, code, a, d, ab] = text.split("|");
    if(c!==cls || code!==voteCodeGlobal) return alert("クラスまたはコードが一致しません。");
    mergeQr.stop().then(() => {
      document.getElementById("reader2").style.display="none";
      agree+=+a; disagree+=+d; absent+=+ab; isMerged=true;
      document.getElementById("agreeNum").innerText=agree;
      document.getElementById("disagreeNum").innerText=disagree;
      document.getElementById("absentNum").innerText=absent;
      let s = document.getElementById("sendBtn"); s.disabled=false; s.style.background="var(--accent)";
      document.getElementById("mergeBtn").style.display="none";
      alert("同期に成功しました。データを送信してください。");
    });
  });
}

function submitData() {
  const b = document.getElementById("sendBtn");
  if (b.disabled && b.innerText !== "リトライ") return; // 送信中以外はガード

  b.disabled = true;
  b.innerText = "送信中...";
  b.style.background = "#444"; // 送信中は暗くする

  fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec", {
    method: "POST",
    body: JSON.stringify({ class: cls, code: voteCodeGlobal, agree, disagree, absent })
  })
  .then(response => {
    if (!response.ok) throw new Error('Network response was not ok');
    alert("送信に成功しました。");
    b.innerText = "送信完了";
    b.style.background = "#222"; // 完了後はさらに暗く（または別の色に）
    b.disabled = true; // 完全に無効化
  })
  .catch(error => {
    console.error('Error:', error);
    alert("送信に失敗しました。何回も続く場合は生徒会本部役員を呼び出してください");
    
    // ▽ リトライできるように復活させる ▽
    b.disabled = false;
    b.innerText = "リトライ";
    b.style.background = "var(--agree-color)"; // 目立つ赤色（--agree-color）に変更
  });
}

// --- 修正：終了ボタンの処理 ---
function goHome() {
  if (confirm("初期画面に戻りますか？（データは破棄されます）")) {
    // 意図的な遷移なので、beforeunload イベントを無効化する
    window.onbeforeunload = null; 
    location.reload();
  }
}
  
function toggleMenu(){ let d=document.getElementById("dropdown"); d.style.display=d.style.display==="block"?"none":"block"; }
function logout(){ if(confirm("ログアウトしてキャッシュをクリアしますか？")){ localStorage.removeItem("classData"); location.reload(); } }
</script>
</body>
</html>
