<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>投票システム</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 全体中央 */
.container {
  width: 100%;
  max-width: 1200px;
  height: 95%;
}

/* 共通カード */
.card {
  width: 100%;
  height: 100%;
  text-align: center;
  position: relative;
}

/* QR */
.big-text {
  font-size: 50px;
  font-weight: bold;
}

.qr-btn {
  font-size: 32px;
  padding: 20px 40px;
  margin: 20px;
}

/* 投票画面 */
#voteArea {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* 上 */
.top-area {
  text-align: center;
}

#progress {
  font-size: 32px;
}

#studentId {
  font-size: 64px;
  font-weight: bold;
}

/* メイン投票 */
.vote-main {
  flex: 1;
  display: flex;
}

/* 半分ボタン */
.vote-half {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 70px;
  font-weight: bold;
  border: none;
  transition: 0.1s;
}

/* 押した感 */
.vote-half:active {
  transform: scale(0.95);
  filter: brightness(0.8);
}

.agree {
  background: #ff3b3b;
}

.disagree {
  background: #2f6bff;
}

/* 欠席 */
.absent {
  width: 100%;
  height: 130px;
  font-size: 42px;
  background: #444;
  color: white;
  border: none;
  transition: 0.1s;
}

.absent:active {
  transform: scale(0.95);
  filter: brightness(0.8);
}

/* 戻る（強化） */
.back-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  font-size: 28px;
  padding: 15px 20px;
  background: #ffcc00;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">

<h2>QR読み取り</h2>

<div id="reader" style="width:300px;margin:auto;"></div>

<button id="qrStartBtn" class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
  <div class="big-text" style="color:#0f0;">
    読み取り成功
  </div>

  <div id="scanResult" style="font-size:32px;margin-top:20px;"></div>

  <button class="qr-btn" onclick="confirmSetup()">次へ</button>
  <button class="qr-btn" onclick="resetQR()">再スキャン</button>
</div>

</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:32px;">
<br><br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">

<button class="back-btn" onclick="goBack()">戻る</button>

<div class="top-area">
  <div id="progress"></div>
  <div id="studentId"></div>
</div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">
    賛成
  </button>

  <button class="vote-half disagree" onclick="vote('反対')">
    反対
  </button>
</div>

<button class="absent" onclick="vote('欠席')">
  欠席
</button>

</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">
<h2>結果</h2>
<p id="resultText"></p>
</div>

</div>

<script>
let cls="", start=1, end=0;
let current, votes=[];
let agree=0, disagree=0, absent=0;
let html5QrCode;

// QR開始
function startQR(){
  document.getElementById("qrStartBtn").style.display="none";

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      onScanSuccess(decodedText);
      html5QrCode.stop();
    }
  );
}

// QR成功
function onScanSuccess(text){
  let data=JSON.parse(text);
  cls=data.class;
  start=data.start;
  end=data.end;

  document.getElementById("afterScan").style.display="block";

  document.getElementById("scanResult").innerText =
    `${cls} ${start}〜${end}番`;
}

// 再スキャン
function resetQR(){
  document.getElementById("afterScan").style.display="none";
  document.getElementById("qrStartBtn").style.display="inline-block";
}

// 設定
function confirmSetup(){
  current=start;
  document.getElementById("setup").style.display="none";
  document.getElementById("codeInput").style.display="block";
}

// 学籍番号
function getStudentId(){
  let [g,c]=cls.split("-");
  return `${g}${c}${String(current).padStart(2,"0")}`;
}

// 開始
function startVoting(){
  let code=document.getElementById("voteCode").value;

  if(code.endsWith("help")){
    alert(`確認\n賛成:${agree} 反対:${disagree} 欠席:${absent}`);
    return;
  }

  document.getElementById("codeInput").style.display="none";
  document.getElementById("voteArea").style.display="flex";
  update();
}

// 更新
function update(){
  document.getElementById("progress").innerText =
    `${current} / ${end}`;
  document.getElementById("studentId").innerText =
    getStudentId();
}

// 投票
function vote(type){
  votes.push(type);

  if(type==="賛成") agree++;
  if(type==="反対") disagree++;
  if(type==="欠席") absent++;

  current++;

  if(current>end){
    showResult();
  }else{
    update();
  }
}

// 戻る
function goBack(){
  if(current===start) return;
  if(!confirm("戻る？")) return;

  current--;
  let last=votes.pop();

  if(last==="賛成") agree--;
  if(last==="反対") disagree--;
  if(last==="欠席") absent--;

  update();
}

// 結果
function showResult(){
  document.getElementById("voteArea").style.display="none";
  document.getElementById("resultArea").style.display="block";

  document.getElementById("resultText").innerText =
    `賛成:${agree} 反対:${disagree} 欠席:${absent}`;
}
</script>

</body>
</html>
