<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│安定版</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
 margin:0;
 background:#111;
 color:white;
 font-family:sans-serif;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.container{
 width:100%;
 max-width:1100px;
 height:95%;
}

.card{
 width:100%;
 height:100%;
 text-align:center;
 position:relative;
}

.qr-btn{
 font-size:26px;
 padding:14px 24px;
 margin:10px;
 border:none;
 border-radius:10px;
}

.white{background:#fff;color:#000;}
.gray{background:#555;color:#fff;}

.vote-main{
 display:flex;
 height:60%;
}

.vote-half{
 flex:1;
 font-size:70px;
 border:none;
 transition:0.1s;
}
.vote-half:active{
 transform:scale(0.95);
}

.agree{background:#ff3b3b;}
.disagree{background:#2f6bff;}

.absent{
 width:100%;
 height:120px;
 font-size:40px;
 background:#444;
 border:none;
}

#progress{font-size:30px;}
#studentId{font-size:60px;font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button id="qrBtn" class="qr-btn white" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
<h2>役割選択</h2>
<button class="qr-btn white" onclick="selectRole('child1')">子機1</button>
<button class="qr-btn white" onclick="selectRole('child2')">子機2</button>
</div>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:28px;">
<br>
<button class="qr-btn white" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">
<div id="progress"></div>
<div id="studentId"></div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>
</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">

<h1 id="resultTitle"></h1>

<div style="display:flex;justify-content:space-between;align-items:center;">

<!-- 左 -->
<div style="font-size:36px;text-align:left;">
賛成：<span id="agreeNum"></span><br>
反対：<span id="disagreeNum"></span><br>
欠席：<span id="absentNum"></span>
</div>

<!-- 右 -->
<div style="display:flex;flex-direction:column;gap:10px;">

<button id="mergeBtn" class="qr-btn white" onclick="startMergeQR()">① データ受信</button>

<button id="sendBtn" class="qr-btn gray" onclick="submitData()" disabled>
② 生徒会に送信
</button>

<button id="homeBtn" class="qr-btn gray" onclick="goHome()">
③ ホームに戻る
</button>

</div>
</div>

<div id="reader2" style="width:300px;margin:20px auto;display:none;"></div>

<div id="qrArea"></div>

<div id="loading" style="display:none;margin-top:20px;">
送信中・・・
</div>

</div>

</div>

<script>
let cls="",ranges=[],role="";
let start=1,end=0,current;
let agree=0,disagree=0,absent=0;
let voteCodeGlobal="";
let votes=[];
let html5QrCode;
let mergeQr;
let isMerged=false;

// QR開始
function startQR(){
 document.getElementById("qrBtn").style.display="none";

 html5QrCode=new Html5Qrcode("reader");

 html5QrCode.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   try{
    let data=JSON.parse(text);
    cls=data.class;
    ranges=data.ranges;
   }catch{
    alert("QRエラー");
    return;
   }

   html5QrCode.stop();
   document.getElementById("afterScan").style.display="block";
  }
 ).catch(()=>{
  alert("カメラ起動失敗（https必要）");
 });
}

// 役割
function selectRole(r){
 let t=ranges.find(x=>x.role===r);
 start=t.start;
 end=t.end;
 role=r;

 document.getElementById("setup").style.display="none";
 document.getElementById("codeInput").style.display="block";
}

// 開始
function startVoting(){
 let code=document.getElementById("voteCode").value;
 if(!code)return alert("コード入れて");

 voteCodeGlobal=code;

 current=start;

 document.getElementById("codeInput").style.display="none";
 document.getElementById("voteArea").style.display="block";

 update();
}

// 更新
function update(){
 document.getElementById("progress").innerText=`${current}/${end}`;
 document.getElementById("studentId").innerText=
  cls.replace("-","")+String(current).padStart(2,"0");
}

// 投票
function vote(type){
 votes.push(type);

 if(type==="賛成")agree++;
 if(type==="反対")disagree++;
 if(type==="欠席")absent++;

 current++;
 current>end?showResult():update();
}

// 結果
function showResult(){
 document.getElementById("voteArea").style.display="none";
 document.getElementById("resultArea").style.display="block";

 document.getElementById("resultTitle").innerText=`${start}~${end}集計結果`;
 document.getElementById("agreeNum").innerText=agree;
 document.getElementById("disagreeNum").innerText=disagree;
 document.getElementById("absentNum").innerText=absent;

 if(role==="child2"){
  document.getElementById("mergeBtn").style.display="none";
  document.getElementById("sendBtn").style.display="none";

  let data=`${cls}|${voteCodeGlobal}|${agree}|${disagree}|${absent}`;

  let box=document.createElement("div");
  box.style.background="white";
  box.style.padding="10px";

  document.getElementById("qrArea").appendChild(box);

  new QRCode(box,{text:data,width:250,height:250});
 }
}

// 受信
function startMergeQR(){

 if(isMerged)return;

 let reader=document.getElementById("reader2");
 reader.style.display="block";

 mergeQr=new Html5Qrcode("reader2");

 mergeQr.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  text=>{
   let ok=mergeData(text);
   if(ok){
    mergeQr.stop();
    document.getElementById("mergeBtn").innerText="受信済み";
   }
  }
 );
}

// 合体
function mergeData(text){
 try{
  let[c,code,a,d,ab]=text.split("|");

  if(c!==cls||code!==voteCodeGlobal){
   alert("コードエラー");
   return false;
  }

  agree+=+a;
  disagree+=+d;
  absent+=+ab;

  isMerged=true;

  document.getElementById("agreeNum").innerText=agree;
  document.getElementById("disagreeNum").innerText=disagree;
  document.getElementById("absentNum").innerText=absent;

  let sendBtn=document.getElementById("sendBtn");
  sendBtn.disabled=false;
  sendBtn.classList.remove("gray");
  sendBtn.classList.add("white");

  alert("受信完了");
  return true;

 }catch(e){
  alert("読み取り失敗");
  return false;
 }
}

// 送信
function submitData(){

 if(role==="child1" && !isMerged){
  alert("先に受信して");
  return;
 }

 let btn=document.getElementById("sendBtn");
 let loading=document.getElementById("loading");

 btn.disabled=true;
 loading.style.display="block";

 fetch("https://script.google.com/macros/s/AKfycbysO_2h1MkXY4s7DY4zHXJe0CddhAkCrgoS9WEZNiOgcqfx1H9sfR2I-GU6YkY8ec6C6Q/exec",{
  method:"POST",
  body:JSON.stringify({class:cls,code:voteCodeGlobal,agree,disagree,absent})
 })
 .then(()=>{
  loading.innerText="送信完了！";

  let home=document.getElementById("homeBtn");
  home.classList.remove("gray");
  home.classList.add("white");

  alert("送信成功");
 })
 .catch(()=>{
  alert("送信失敗");
  btn.disabled=false;
  loading.style.display="none";
 });
}

// ホーム
function goHome(){
 if(!confirm("戻る？"))return;
 location.reload();
}
</script>

</body>
</html>
